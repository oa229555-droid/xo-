name: OMEGA DESTROYER
on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  destroy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y tor proxychains nmap masscan hping3
          
      - name: System Tuning
        run: |
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv4.tcp_max_syn_backlog=1048576
          sudo sysctl -w net.core.rmem_max=536870912
          sudo sysctl -w net.core.wmem_max=536870912
          sudo sysctl -w net.ipv4.tcp_tw_reuse=1
          sudo sysctl -w net.ipv4.tcp_tw_recycle=1
          sudo ulimit -n 1048576
          sudo ulimit -u unlimited
          
      - name: Start TOR
        run: |
          sudo service tor start
          sudo proxychains curl ipinfo.io
          
      - name: Run Omega
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: |
          python src/core/engine.py --scan --destroy --threads 100000000
          
      - name: Keep Alive
        run: |
          while true; do
            sleep 300
            python src/core/engine.py --resume
          done
